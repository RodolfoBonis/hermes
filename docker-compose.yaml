version: '3'

services:
  hermes:
    build:
      context: .
      dockerfile: dockerfile
    restart: always
    ports:
      - ${PORT}:${PORT}
    env_file:
      - .env
    environment:
      - ENV=$ENV}
      - PORT=${PORT}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - REALM=${REALM}
      - KEYCLOAK_HOST=${KEYCLOAK_HOST}